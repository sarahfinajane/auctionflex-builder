<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuctionFlex Builder</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <header class="top">
      <h1>AuctionFlex CSV Builder</h1>
      <p>CSV builder + photo slots + camera capture + renamed image ZIP.</p>
    </header>

    <section class="panel master-panel">
      <div class="section-title">MASTER SETTINGS</div>

      <div class="grid">
        <label>How many lot lines?
          <input id="lotCount" type="number" min="1" value="10" />
        </label>

        <label>Master Seller Code
          <input id="masterSellerCode" value="HouseCC" />
        </label>

        <label>Master Start Bid
          <input id="masterStartBid" value="3" />
        </label>
      </div>

      <label class="checkbox-line">
        <input id="copySellerCode" type="checkbox" checked />
        Copy seller code to every lot
      </label>

      <label class="checkbox-line">
        <input id="copyStartBid" type="checkbox" checked />
        Copy start bid to every lot
      </label>

      <div class="section-title small-title">MASTER FROM STORE</div>

      <label class="checkbox-line">
        <input id="copyFrom" type="checkbox" checked />
        Copy selected store to every lot
      </label>

      <div class="store-list">
        <label><input name="masterFrom" type="radio" value="Home Depot" checked /> Home Depot</label>
        <label><input name="masterFrom" type="radio" value="Target" /> Target</label>
        <label><input name="masterFrom" type="radio" value="Walmart" /> Walmart</label>
        <label><input name="masterFrom" type="radio" value="Lowe's" /> Lowe's</label>
        <label><input name="masterFrom" type="radio" value="Amazon" /> Amazon</label>
        <label><input name="masterFrom" type="radio" value="" /> Blank / Unknown</label>
      </div>

      <div class="section-title small-title">MASTER DESCRIPTION</div>

      <label class="checkbox-line">
        <input id="copyDescription" type="checkbox" checked />
        Copy this master description to every lot
      </label>

      <textarea id="masterDescription" rows="12">Description:
{TITLE}

From:
{FROM}

Retail:
{PRICE}

Condition:
unchecked, AS IS!

SELLER CODE:
SJ

LOTS MAY BE DAMAGED OR MISSING PIECES. PREVIEW FOR ALL LOTS IS AVAILABLE FROM THURSDAY-SATURDAY DURING BUSINESS HOURS ALL BIDS ARE FINAL. ONCE A BID IS PLACED WE CANNOT CHANGE IT. NO SHIPPING AND NO DELIVERY AVAILABLE. THANK YOU.</textarea>

      <p class="hint">Placeholders you can use: {TITLE}, {PRICE}, {FROM}</p>

      <button id="createRows" class="primary-btn">Create / Reset Lot Lines</button>
      <button id="applyMaster" class="secondary-btn">Apply Master Settings To Existing Lots</button>
    </section>

    <section class="panel">
      <div class="section-title">LOT LINES</div>
      <div id="lots"></div>
    </section>

    <section class="download-bar">
      <button id="downloadCsv" class="primary-btn">Download CSV</button>
      <button id="downloadImages" class="primary-btn">Download Image ZIP</button>
    </section>
  </main>

  <template id="lotTemplate">
    <article class="lot-card">
      <div class="lot-header">
        <h2>Lot Line</h2>
        <button class="ocrBtn" type="button">Extract Title + Price From Slot 2</button>
      </div>

      <div class="section-title small-title">LOT DETAILS</div>

      <div class="grid">
        <label>Lot #
          <input class="lotNumber" />
        </label>

        <label>Seller Code
          <input class="sellerCode" />
        </label>

        <label>Start Bid
          <input class="startBid" />
        </label>

        <label>Title, 50 characters max
          <input class="title" maxlength="50" />
        </label>

        <label>From
          <select class="from">
            <option value="">Blank / Unknown</option>
            <option value="Home Depot">Home Depot</option>
            <option value="Target">Target</option>
            <option value="Walmart">Walmart</option>
            <option value="Lowe's">Lowe's</option>
            <option value="Amazon">Amazon</option>
          </select>
        </label>

        <label>Retail Price
          <input class="price" placeholder="$0.00" />
        </label>
      </div>

      <div class="section-title small-title">PHOTO SLOTS</div>

      <div class="photo-slots">
        <div class="photo-box">
          <span class="slot-name">SLOT 1</span>
          <strong>Stock Photos</strong>
          <em>Goes into image ZIP</em>

          <label class="upload-btn">Upload Stock Photos
            <input class="stockPhotos" type="file" accept="image/*" multiple />
          </label>

          <label class="camera-btn">Take Stock Photo
            <input class="stockCamera" type="file" accept="image/*" capture="environment" />
          </label>

          <div class="preview stockPreview"></div>
        </div>

        <div class="photo-box info-box">
          <span class="slot-name">SLOT 2</span>
          <strong>Info / Price Photos</strong>
          <em>OCR only, not zipped</em>

          <label class="upload-btn">Upload Info Photos
            <input class="infoPhotos" type="file" accept="image/*" multiple />
          </label>

          <label class="camera-btn">Take Info Photo
            <input class="infoCamera" type="file" accept="image/*" capture="environment" />
          </label>

          <div class="preview infoPreview"></div>
        </div>

        <div class="photo-box">
          <span class="slot-name">SLOT 3</span>
          <strong>In-Person Photos</strong>
          <em>Goes into image ZIP</em>

          <label class="upload-btn">Upload In-Person Photos
            <input class="personPhotos" type="file" accept="image/*" multiple />
          </label>

          <label class="camera-btn">Take In-Person Photo
            <input class="personCamera" type="file" accept="image/*" capture="environment" />
          </label>

          <div class="preview personPreview"></div>
        </div>
      </div>

      <div class="section-title small-title">DESCRIPTION</div>

      <textarea class="description" rows="9"></textarea>

      <div class="status"></div>
    </article>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
